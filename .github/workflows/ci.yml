name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run tests
        run: zig build test --summary all

      - name: Build CLI binary
        run: zig build

      - name: Run CLI contract checks
        run: ./.github/scripts/omohi_contract.sh ./zig-out/bin/omohi

      - name: Run CLI reliability checks
        run: ./.github/scripts/omohi_reliability.sh ./zig-out/bin/omohi

      - name: Run shell completion checks
        run: ./.github/scripts/omohi_completion.sh

      - name: Check generated CLI docs
        run: make docs-check
